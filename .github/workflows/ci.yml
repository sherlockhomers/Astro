name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend: lint + pytest ─────────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    defaults:
      run:
        working-directory: backend
    env:
      # 喂给 config.py 的占位值，不然那些安全校验会直接 raise
      APP_ENV: dev
      AUTH_SECRET: "ci-unit-test-secret-must-be-32-chars-or-longer-placeholder"
      NEO4J_ENABLED: "false"
      MILVUS_ENABLED: "false"
      MINIO_ENABLED: "false"
      STARWHISPER_ENABLED: "false"
      WEB_SEARCH_ENABLED: "false"
      MCP_TOOLS_ENABLED: "false"
      CLIP_WARMUP_ON_STARTUP: "false"
      ASTRO_VISION_WARMUP_ON_STARTUP: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic pydantic-settings python-multipart
          pip install numpy pillow networkx httpx pytest pytest-cov ruff

      - name: Lint with ruff
        run: ruff check app tests --output-format=github || true

      # 只跑完全不依赖 CSV / 图谱 / 本地模型的干净 unit tests。
      # integration / agent / graph / qa 那些 CI 容器里跑不了，留给本地开发。
      - name: Run pytest (unit tests only)
        run: |
          pytest tests/test_fact_rules_loader.py \
                 tests/test_query_expansion.py \
                 tests/test_user_service.py \
                 tests/test_question_type_classifier.py \
                 -q --disable-warnings

  # ─── Frontend: type-check + build ───────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20"]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # 用 install 不用 ci：package.json 加了新 devDep 但还没同步 lock 的时候也能跑起来
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: TypeScript type-check
        run: npx vue-tsc --noEmit || true

      - name: Build (production)
        run: npm run build

  # ─── Optional: Docker image build sanity check ──────────────────────────────
  docker-build:
    name: Docker sanity build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Backend image
        run: docker build -t astro-backend:ci ./backend
      - name: Frontend image
        run: docker build -t astro-frontend:ci --build-arg VITE_API_BASE_URL=http://localhost:8000 ./frontend
