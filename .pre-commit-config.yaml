repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: ^frontend/(package-lock\.json|node_modules/)
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: no-hardcoded-secrets
        name: 拦截弱密码/占位符进 compose
        entry: bash -c 'if grep -nE "(NEO4J_AUTH: neo4j/password|MINIO_ROOT_PASSWORD: minioadmin|AUTH_SECRET=change)" compose.yaml docker-compose.prod.yml 2>/dev/null; then echo "发现弱密码或占位符，别提交"; exit 1; fi'
        language: system
        pass_filenames: false
