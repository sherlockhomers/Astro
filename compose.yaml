services:
  neo4j:
    image: neo4j:5
    container_name: astro-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      # 本地开发够用就行，上生产请在 .env 里覆盖 NEO4J_PASSWORD
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-dev_only_change_me_32_chars}
    volumes:
      - neo4j_data:/data

  minio:
    image: minio/minio:latest
    container_name: astro-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dev_only_change_me}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  milvus-standalone:
    image: milvusdb/milvus:v2.4.13
    container_name: astro-milvus
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    volumes:
      - milvus_data:/var/lib/milvus

  redis:
    image: redis:7
    container_name: astro-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  neo4j_data:
  minio_data:
  milvus_data:
  redis_data:
