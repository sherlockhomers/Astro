services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: astro-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - AUTH_SECRET=${AUTH_SECRET:-change-this-to-random-32-chars}
      - NEO4J_ENABLED=true
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_PASSWORD=password
      - MILVUS_ENABLED=true
      - MILVUS_HOST=milvus-standalone
      - MINIO_ENABLED=true
      - MINIO_ENDPOINT=minio:9000
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80
    volumes:
      - ./data:/app/data
      - backend_db:/app
    depends_on:
      - neo4j
      - milvus-standalone
      - minio
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8000
    container_name: astro-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: astro-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: astro-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  milvus-standalone:
    image: milvusdb/milvus:v2.3.21
    container_name: astro-milvus
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    volumes:
      - milvus_data:/var/lib/milvus
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: astro-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  backend_db:
  neo4j_data:
  minio_data:
  milvus_data:
  redis_data:
