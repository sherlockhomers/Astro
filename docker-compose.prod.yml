# 生产环境用的 compose。所有 ${VAR:?...} 的变量缺了就直接 fail，别想偷懒。
# 起法：
#   cp .env.prod.example .env.prod   # 改里面的占位符
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: astro-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET is required (>=32 random chars)}
      - NEO4J_ENABLED=true
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      - MILVUS_ENABLED=true
      - MILVUS_HOST=milvus-standalone
      - MINIO_ENABLED=true
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      - AUTH_COOKIE_SECURE=true
      - MCP_NASA_API_KEY=${MCP_NASA_API_KEY:?MCP_NASA_API_KEY is required}
    volumes:
      - ./data:/app/data
      - backend_db:/app
    depends_on:
      - neo4j
      - milvus-standalone
      - minio
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:?VITE_API_BASE_URL is required}
    container_name: astro-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: astro-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: astro-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  milvus-standalone:
    image: milvusdb/milvus:v2.4.13
    container_name: astro-milvus
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    volumes:
      - milvus_data:/var/lib/milvus
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: astro-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  backend_db:
  neo4j_data:
  minio_data:
  milvus_data:
  redis_data:
