[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = [".venv", ".venv_old_migrated", "alembic/versions", "vendor"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # bugbear
]
ignore = [
    "E501",  # 行长度，这项目还没修完，先放一放
    "B008",  # FastAPI Depends() 经常会在默认参数里调用，这是合法的
    "B904",  # raise ... from ... 还没全面补齐
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra -q --strict-markers"
filterwarnings = [
    "ignore::UserWarning",
    "ignore::DeprecationWarning",
]
