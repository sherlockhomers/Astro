[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short --strict-markers
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    integration: 需要完整 FastAPI app/lifespan 启动的端到端测试，CI 默认不跑
    stale: 测试期望与当前代码漂移、已知挂；待修复后再去掉这个 marker
